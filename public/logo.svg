<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="hadesBg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="55%" stop-color="#8e7df0"/>
      <stop offset="100%" stop-color="#00cec9"/>
    </linearGradient>
    <linearGradient id="hadesNode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a5f3f0"/>
    </linearGradient>
    <radialGradient id="hadesGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Hexagonal frame (pointy-top) -->
  <path d="M32 4 L56.25 18 L56.25 46 L32 60 L7.75 46 L7.75 18 Z" fill="url(#hadesBg)"/>

  <!-- Soft inner glow -->
  <ellipse cx="32" cy="32" rx="22" ry="20" fill="url(#hadesGlow)"/>

  <!-- Inner hex outline for depth -->
  <path d="M32 9 L51.92 20.5 L51.92 43.5 L32 55 L12.08 43.5 L12.08 20.5 Z" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="0.7"/>

  <!-- LEFT BAR with spear-tip top and bottom -->
  <rect x="18" y="18" width="5" height="28" fill="#ffffff"/>
  <path d="M18 18 L23 18 L20.5 13 Z" fill="#ffffff"/>
  <path d="M18 46 L23 46 L20.5 51 Z" fill="#ffffff"/>

  <!-- RIGHT BAR with spear-tip top and bottom -->
  <rect x="41" y="18" width="5" height="28" fill="#ffffff"/>
  <path d="M41 18 L46 18 L43.5 13 Z" fill="#ffffff"/>
  <path d="M41 46 L46 46 L43.5 51 Z" fill="#ffffff"/>

  <!-- Crossbar split into two segments by central node -->
  <rect x="23" y="29.5" width="6" height="5" fill="#ffffff"/>
  <rect x="35" y="29.5" width="6" height="5" fill="#ffffff"/>

  <!-- Central diamond core node -->
  <path d="M32 26 L37 32 L32 38 L27 32 Z" fill="url(#hadesNode)" stroke="#ffffff" stroke-width="0.7"/>
  <circle cx="32" cy="32" r="1.3" fill="#6c5ce7"/>

  <!-- Circuit traces extending from hex sides to H bars -->
  <line x1="12.5" y1="32" x2="18" y2="32" stroke="#ffffff" stroke-opacity="0.6" stroke-width="0.8"/>
  <line x1="46" y1="32" x2="51.5" y2="32" stroke="#ffffff" stroke-opacity="0.6" stroke-width="0.8"/>
  <circle cx="12.5" cy="32" r="0.95" fill="#ffffff" fill-opacity="0.75"/>
  <circle cx="51.5" cy="32" r="0.95" fill="#ffffff" fill-opacity="0.75"/>
</svg>
