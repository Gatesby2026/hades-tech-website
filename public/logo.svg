<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="hadesGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#00cec9"/>
    </linearGradient>
    <linearGradient id="hadesNode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00cec9"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#hadesGrad)"/>
  <!-- Left vertical bar of H, with angled inner top (helmet/throne hint) -->
  <path d="M14 14 L24 14 L24 24 L24 50 L14 50 Z" fill="#ffffff"/>
  <path d="M24 14 L24 24 L18 18 Z" fill="#ffffff" fill-opacity="0.55"/>
  <!-- Right vertical bar of H, mirrored angled inner top -->
  <path d="M40 14 L50 14 L50 50 L40 50 L40 24 Z" fill="#ffffff"/>
  <path d="M40 14 L40 24 L46 18 Z" fill="#ffffff" fill-opacity="0.55"/>
  <!-- Crossbar of H -->
  <rect x="24" y="28" width="16" height="8" fill="#ffffff"/>
  <!-- Tech accent: glowing core node at the center of the crossbar -->
  <circle cx="32" cy="32" r="3.2" fill="url(#hadesNode)"/>
  <circle cx="32" cy="32" r="1.4" fill="#ffffff"/>
</svg>
